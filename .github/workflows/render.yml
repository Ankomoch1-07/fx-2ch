name: Render Episode

# 台本(scripts/<ep>.txt)からクラウドで動画を生成する。
# 使い方: GitHubの Actions タブ → "Render Episode" → Run workflow → ep名を入力
on:
  workflow_dispatch:
    inputs:
      ep:
        description: "エピソード名（scripts/<ep>.txt の <ep>）"
        required: true
        default: "ep02"

# 入力はshellに直書きせず環境変数経由で扱う（インジェクション対策）
env:
  EP: ${{ inputs.ep }}

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    services:
      voicevox:
        image: voicevox/voicevox_engine:cpu-latest
        ports:
          - 50021:50021

    steps:
      - name: ep名バリデーション（英数・_・-のみ許可）
        run: |
          printf '%s' "$EP" | grep -Eq '^[A-Za-z0-9_-]+$' || { echo "invalid ep: $EP"; exit 1; }

      - name: Checkout（LFS込み）
        uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Python依存
        run: python -m pip install --quiet requests matplotlib japanize-matplotlib

      - name: Chrome(Remotion)＋日本語フォント
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libdbus-1-3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
            libgbm1 libpango-1.0-0 libcairo2 libxdamage1 libxfixes3 \
            libxrandr2 libxcomposite1 libxcursor1 libxi6 libxtst6 libglib2.0-0 \
            fonts-noto-cjk
          # libasound はUbuntuのバージョンで名前が違うため両対応
          sudo apt-get install -y libasound2t64 || sudo apt-get install -y libasound2

      - name: VOICEVOX起動待ち
        run: |
          for i in $(seq 1 90); do
            curl -sf http://localhost:50021/version && break || sleep 2
          done
          curl -sf http://localhost:50021/version

      - name: Remotion依存
        working-directory: remotion
        run: npm ci

      - name: 素材チェック＋QA
        run: |
          python build/check_assets.py "scripts/${EP}.txt"
          python build/qa.py "scripts/${EP}.txt" || echo "QA warnings（続行）"

      - name: 音声・グラフ・タイムライン生成
        env:
          MPLBACKEND: Agg
        run: |
          python build/tts.py   "scripts/${EP}.txt"
          python build/graph.py "scripts/${EP}.txt"
          DEST="remotion/public/${EP}"
          mkdir -p "$DEST/graph"
          cp out/voice.wav out/timeline.json "$DEST/"
          cp out/graph/*.png "$DEST/graph/" 2>/dev/null || true

      - name: Remotionレンダ
        working-directory: remotion
        run: |
          npx remotion render src/index.ts Main "../out/${EP}.mp4" \
            --props="{\"ep\":\"${EP}\"}"

      - name: 完成mp4をアップロード（成果物）
        uses: actions/upload-artifact@v4
        with:
          name: "episode-mp4"
          path: "out/*.mp4"
          retention-days: 14
